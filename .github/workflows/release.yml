name: Release Clear Da Boom

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to upload (e.g. 1.0.0)
        required: true

jobs:
  package-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set version
        run: echo "VERSION=${{ github.event.release.tag_name || inputs.version }}" >> "$GITHUB_ENV"

      - name: Package (no git artefacts)
        run: |
          git archive --format=zip --prefix="Clear Da Boom/" \
            -o "Clear-Da-Boom-${VERSION}.zip" HEAD

      - name: Verify zip contents
        run: |
          unzip -l "Clear-Da-Boom-${VERSION}.zip"
          if unzip -l "Clear-Da-Boom-${VERSION}.zip" | grep -E '\.git|\.github|tests/'; then
            echo "Unwanted artefacts found in zip" && exit 1
          fi
          unzip -l "Clear-Da-Boom-${VERSION}.zip" | grep -q 'Clear Da Boom/Clear Da Boom.mod' \
            || { echo "Missing Clear Da Boom.mod" && exit 1; }

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: Clear-Da-Boom-${{ env.VERSION }}
          path: Clear-Da-Boom-${{ env.VERSION }}.zip

      - name: Resolve Nexus file_id (v2 GraphQL groupId)
        if: ${{ !github.event.release.prerelease }}
        run: |
          FID=$(curl -sS -H "apikey: ${{ secrets.NEXUSMODS_APIKEY }}" -H "content-type: application/json" \
            -X POST "https://api.nexusmods.com/v2/graphql" \
            -d '{"query":"query{modFiles(modId:\"${{ vars.NEXUS_MOD_ID }}\",gameId:\"4943\"){primary category groupId}}"}' \
            | jq -r '([.data.modFiles[]|select(.primary==1)]+[.data.modFiles[]|select(.category=="MAIN")])[0].groupId')
          if [ -z "$FID" ] || [ "$FID" = "null" ]; then echo "no groupId" && exit 1; fi
          echo "NEXUS_FILE_ID=$FID" >> "$GITHUB_ENV"

      - name: Upload to Nexus Mods
        if: ${{ !github.event.release.prerelease }}
        uses: Nexus-Mods/upload-action@v1.0.0-beta.8
        with:
          api_key: ${{ secrets.NEXUSMODS_APIKEY }}
          file_id: ${{ env.NEXUS_FILE_ID }}
          filename: Clear-Da-Boom-${{ env.VERSION }}.zip
          version: ${{ env.VERSION }}
          display_name: Clear Da Boom ${{ env.VERSION }}
          category: main
          description: ${{ github.event.release.body }}
